<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Neon Defense</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ac;
            --neon-green: #00ff41;
            --bg-color: #050510;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .logo {
            width: clamp(140px, 22vw, 220px);
            height: auto;
            margin-bottom: 1.2rem;
            filter: drop-shadow(0 0 18px rgba(0, 243, 255, 0.35));
        }

        .title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--neon-blue);
            text-shadow:
                0 0 10px var(--neon-blue),
                0 0 40px rgba(0, 243, 255, 0.4);
            margin-bottom: 0.3em;
        }

        .subtitle {
            font-size: clamp(0.65rem, 1.5vw, 0.85rem);
            letter-spacing: 0.35em;
            color: rgba(0, 243, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 4rem;
        }

        .buttons {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 2rem 3rem;
            border: 1px solid;
            background: rgba(5, 5, 16, 0.9);
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .btn-label {
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            opacity: 0.6;
        }

        /* JS button — blue */
        .btn-js {
            color: var(--neon-blue);
            border-color: rgba(0, 243, 255, 0.6);
            box-shadow:
                0 0 16px rgba(0, 243, 255, 0.2),
                inset 0 0 16px rgba(0, 243, 255, 0.04);
        }

        .btn-js:hover {
            border-color: var(--neon-blue);
            box-shadow:
                0 0 32px rgba(0, 243, 255, 0.5),
                inset 0 0 24px rgba(0, 243, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Flutter button — pink */
        .btn-flutter {
            color: var(--neon-pink);
            border-color: rgba(255, 0, 172, 0.6);
            box-shadow:
                0 0 16px rgba(255, 0, 172, 0.2),
                inset 0 0 16px rgba(255, 0, 172, 0.04);
        }

        .btn-flutter:hover {
            border-color: var(--neon-pink);
            box-shadow:
                0 0 32px rgba(255, 0, 172, 0.5),
                inset 0 0 24px rgba(255, 0, 172, 0.1);
            transform: translateY(-2px);
        }

        .version {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            color: rgba(0, 243, 255, 0.25);
        }

        .footer-links {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            display: flex;
            gap: 1.5rem;
        }

        .footer-links a {
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            color: rgba(0, 243, 255, 0.25);
            text-decoration: none;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: var(--neon-blue);
        }
</style>
</head>

<body>
    <img class="logo" src="./assets/logo.png" alt="The Neon Defense">
    <h1 class="title">The Neon Defense</h1>
    <p class="subtitle">Choose your platform</p>

    <div class="buttons">
        <a class="btn btn-js" href="./js/index.html">
            <span>Web</span>
            <span class="btn-label">JavaScript</span>
        </a>

        <a class="btn btn-flutter" href="./flutter/build/web/index.html">
            <span>App</span>
            <span class="btn-label">Flutter</span>
        </a>
    </div>

    <div class="footer-links">
        <a href="./js/manual.html">Manual</a>
        <a href="https://github.com/oscarshaitan/the-neon-defense" target="_blank" rel="noopener">Repository</a>
    </div>

    <div class="version">v0.1.0</div>
</body>

</html>
