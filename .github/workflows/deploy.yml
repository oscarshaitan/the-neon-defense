name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Flutter build ──────────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        working-directory: flutter
        run: |
          flutter pub get
          flutter build web --release
          # Use relative base-href so the app works at any served path
          sed -i 's|<base href="/">|<base href="./">|g' build/web/index.html

      # ── Assemble deploy folder ─────────────────────────────────────────────
      # Structure served by GitHub Pages:
      #   /                        → landing page
      #   /js/                     → JS game
      #   /flutter/build/web/      → Flutter web build (relative base-href)
      - name: Assemble site
        run: |
          mkdir -p _site/js _site/flutter/build/web _site/assets
          cp index.html _site/
          cp README.md  _site/
          cp -r assets/. _site/assets/
          cp -r js/. _site/js/
          cp -r flutter/build/web/. _site/flutter/build/web/

      # ── Upload artifact for GitHub Pages ───────────────────────────────────
      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
